apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}-deployment
  labels:
    app: {{ .Values.deployment.name }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: {{ .Values.deployment.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.deployment.name }}
    spec:
      containers:
      - name: {{ .Values.deployment.name }}
        image: {{ .Values.deployment.image }}:{{ .Values.deployment.tag }}
        env:
          - name: MEMOS_DRIVER
            value: "postgres"
          
          - name: MEMOS_DSN
            value: "postgresql://memosuser:memospassword@production-rds.c7ueomi6yzcn.eu-west-2.rds.amazonaws.com:5432/postgresrds?sslmode=require"
        ports:
        - containerPort: 8081
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.2"
